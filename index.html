<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year Canvas — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    background: #F4F5F7; color: #1B1E26;
    -webkit-font-smoothing: antialiased; font-size: 14px;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(20,24,33,.16); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(20,24,33,.26); }
  ::-webkit-scrollbar-track { background: transparent; }
  input, textarea, select, button { font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: none; }

  /* hover states (ported from style-hover in the design) */
  .backlog-item:hover { border-color:#DCDEE5 !important; box-shadow:0 2px 6px rgba(16,24,40,.07) !important; }
  .chip:hover { filter:brightness(0.97); }
  .chip-cont:hover { filter:brightness(0.96); }
  .add-btn:hover { background:#33384a !important; }
  .cat-row:hover { background:#FAFAFB; }
  .reset-btn:hover { color:#6B7280 !important; }
  .subadd-btn:hover { background:#F3F4F6 !important; }
  .range-label:hover { filter:brightness(0.94); }
  .done-btn:hover { background:#33384a !important; }
  .tobacklog-btn:hover { background:#F3F4F6 !important; }
  .delete-btn:hover { color:#96281c !important; }
  .topbar-ctl { cursor:pointer; }
  .cat-edit { opacity:0; transition:opacity .12s; cursor:pointer; }
  .cat-row:hover .cat-edit { opacity:1; }
  .cat-edit:hover { color:#5A606C !important; }
  .swatch:hover { transform:scale(1.1); }
  .collapse-btn:hover { background:#EEF0F3 !important; color:#2A2E38 !important; border-color:#C7CAD2 !important; }
  .today-btn:hover { background:#EEF2FB !important; border-color:#B9C7EC !important; }

  /* drag-over highlight (applied directly to drop targets during a drag) */
  .cell.hot { background: rgba(74,110,210,.14) !important; }
  .backlog-drop.hot { background: rgba(70,110,220,.07) !important; box-shadow: inset 0 0 0 2px oklch(0.62 0.12 256) !important; }

  /* compact mode */
  .compact .day-row { min-height: 20px !important; }
  .compact .chip { font-size: 9.5px !important; padding: 1px 4px 1px 5px !important; }
  .compact .day-num { font-size: 10px !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  // ----------------------------------------------------------------- constants
  var MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DIM  = [31,28,31,30,31,30,31,31,30,31,30,31]; // 2026 (not a leap year)
  var YEAR = 2026;
  // "Today" lights up the live date when the calendar's year is the current one.
  var TODAY_M = 5, TODAY_D = 27; // fallback (June 27)
  try {
    var _now = new Date();
    if (_now.getFullYear() === YEAR) { TODAY_M = _now.getMonth(); TODAY_D = _now.getDate(); }
  } catch (e) {}
  var STORE = 'yearcanvas.local.v2';
  var ACCENT_BORDER = 'oklch(0.62 0.12 256)';
  var TODAY_ACCENT = 'oklch(0.54 0.18 262)'; // bolder blue for the current-day markers

  // ----------------------------------------------------------- Supabase sync
  // The anon key is meant to be public (it only grants what RLS allows).
  // Paste your project's values here, then commit + redeploy.
  // Bare project URL — the supabase-js client appends /rest/v1/ itself.
  var SUPABASE_URL = 'https://gvqhwsclloqrwmktqfra.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_0Ok46boxS4xLFUbWaGOOLw_2i1YzHai';
  var CLOUD_ROW_ID = 'singleton'; // single shared dataset (no login)
  var sb = (window.supabase && SUPABASE_URL.indexOf('http') === 0)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  // each palette maps a default category id to an oklch color {l,c,h}.
  // Custom categories carry their own .color and ignore the palette.
  var PALETTES = {
    default: { c_work:{l:0.62,c:0.165,h:252}, c_health:{l:0.70,c:0.165,h:150}, c_home:{l:0.74,c:0.155,h:66}, c_travel:{l:0.64,c:0.190,h:18}, c_personal:{l:0.60,c:0.180,h:300} },
    cool:    { c_work:{l:0.60,c:0.110,h:248}, c_health:{l:0.66,c:0.100,h:192}, c_home:{l:0.63,c:0.095,h:222}, c_travel:{l:0.60,c:0.110,h:300}, c_personal:{l:0.58,c:0.105,h:276} },
    warm:    { c_work:{l:0.62,c:0.120,h:30},  c_health:{l:0.65,c:0.110,h:135}, c_home:{l:0.70,c:0.125,h:62}, c_travel:{l:0.62,c:0.130,h:8},  c_personal:{l:0.62,c:0.120,h:330} },
  };

  // selectable swatches for custom category colors
  var SWATCHES = [
    {l:0.62,c:0.165,h:252}, {l:0.70,c:0.165,h:150}, {l:0.74,c:0.155,h:66},  {l:0.64,c:0.190,h:18},
    {l:0.60,c:0.180,h:300}, {l:0.66,c:0.130,h:200}, {l:0.67,c:0.155,h:45},  {l:0.64,c:0.120,h:225},
    {l:0.62,c:0.160,h:330}, {l:0.58,c:0.140,h:280}, {l:0.70,c:0.150,h:110}, {l:0.62,c:0.140,h:170}
  ];

  // seed colors used when migrating legacy holidays / vacations into shaded categories
  var COLOR_VACATION = {l:0.64,c:0.12,h:225};
  var COLOR_HOLIDAY  = {l:0.67,c:0.155,h:45};

  function oklchStr(c) { return 'oklch(' + c.l + ' ' + c.c + ' ' + c.h + ')'; }
  function sameColor(a, b) { return !!a && !!b && a.l === b.l && a.c === b.c && a.h === b.h; }

  // ----------------------------------------------------------------- defaults
  function buildDefault() {
    // a "shaded" category tints the whole day (for holidays, vacations, time off)
    var categories = [
      { id:'c_work', name:'Work' },
      { id:'c_health', name:'Health' },
      { id:'c_home', name:'Home' },
      { id:'c_travel', name:'Travel' },
      { id:'c_personal', name:'Personal' },
      { id:'c_vacation', name:'Vacation', color:COLOR_VACATION, shade:true },
      { id:'c_holiday', name:'Public holiday', color:COLOR_HOLIDAY, shade:true, partial:true },
    ];
    var items = [
      // ---- backlog (month: null) ----
      { id:'it_1', title:'Wireframe onboarding', categoryId:'c_work', note:'', month:null, day:null },
      { id:'it_2', title:'Record episode 12', categoryId:'c_work', note:'Guest: Mira', month:null, day:null },
      { id:'it_3', title:'Sort tax receipts', categoryId:'c_work', note:'', month:null, day:null },
      { id:'it_4', title:'Replace garage shelving', categoryId:'c_home', note:'', month:null, day:null },
      { id:'it_5', title:'Repaint the hallway', categoryId:'c_home', note:'', month:null, day:null },
      { id:'it_6', title:'Plan summer trip', categoryId:'c_travel', note:'Coast or mountains?', month:null, day:null },
      { id:'it_7', title:'Sign up for a 10k', categoryId:'c_health', note:'', month:null, day:null },
      { id:'it_8', title:'New strength program', categoryId:'c_health', note:'', month:null, day:null },
      { id:'it_9', title:'Back up photo archive', categoryId:'c_personal', note:'', month:null, day:null },
      { id:'it_10', title:'Sketch podcast rebrand', categoryId:'c_work', note:'', month:null, day:null },
      { id:'it_11', title:'Research standing desk', categoryId:'c_personal', note:'', month:null, day:null },
      { id:'it_12', title:'Declutter the closet', categoryId:'c_home', note:'', month:null, day:null },
      // ---- scheduled (month + day; optional endMonth/endDay for multi-day) ----
      { id:'it_13', title:'Ship v2 release', categoryId:'c_work', note:'Feature freeze first', month:5, day:22 },
      { id:'it_14', title:'Kitchen reno quotes', categoryId:'c_home', note:'', month:5, day:5 },
      { id:'it_15', title:'Strength PR test', categoryId:'c_health', note:'', month:5, day:28 },
      { id:'it_16', title:'Garage epoxy floor', categoryId:'c_home', note:'2-day cure', month:6, day:1, endMonth:6, endDay:2 },
      { id:'it_17', title:'Q3 planning', categoryId:'c_work', note:'', month:6, day:14 },
      { id:'it_18', title:'Family beach week', categoryId:'c_travel', note:'', month:7, day:19, endMonth:7, endDay:25 },
      { id:'it_19', title:'Podcast live event', categoryId:'c_work', note:'Venue TBD', month:8, day:12 },
      { id:'it_20', title:'Half marathon', categoryId:'c_health', note:'', month:9, day:11 },
      { id:'it_21', title:'Conference talk', categoryId:'c_work', note:'', month:10, day:6 },
      { id:'it_22', title:'Mobility reset', categoryId:'c_health', note:'', month:2, day:18 },
      { id:'it_23', title:'Kickoff planning', categoryId:'c_work', note:'', month:0, day:7 },
      { id:'it_24', title:'Garden beds', categoryId:'c_home', note:'', month:3, day:20 },
      { id:'it_25', title:'Year review', categoryId:'c_work', note:'', month:11, day:12 },
      // ---- holidays & vacations are just shaded-category items now ----
      { id:'r_1', title:'Easter holiday', categoryId:'c_holiday', note:'School break', month:2, day:30, endMonth:3, endDay:12 },
      { id:'r_2', title:'Easter Monday', categoryId:'c_holiday', note:'Bank holiday', month:3, day:6, endMonth:3, endDay:6 },
      { id:'r_3', title:'Summer vacation', categoryId:'c_vacation', note:'', month:7, day:3, endMonth:7, endDay:16 },
      { id:'r_4', title:"New Year's Day", categoryId:'c_holiday', note:'', month:0, day:1, endMonth:0, endDay:1 },
    ];
    var pv = {};
    categories.forEach(function (c) { pv[c.id] = true; });
    return { categories: categories, items: items, pv: pv };
  }

  function normCat(c) {
    return {
      id: c.id || ('c_' + Date.now()),
      name: c.name || 'Category',
      color: (c.color && typeof c.color === 'object') ? c.color : null,
      shade: !!c.shade,
      partial: !!c.partial // shade only a 25% band (layers over full-day shades)
    };
  }

  function normalizeItem(it) {
    var d = it.day;
    if (it.month != null && d == null) d = 1;
    if (d != null && d > 31) d = 31;
    var month = (it.month == null ? null : it.month);
    var day = (it.month == null ? null : d);
    var endMonth = null, endDay = null;
    if (month != null && it.endMonth != null) {
      endMonth = it.endMonth; endDay = (it.endDay == null ? day : it.endDay);
      if (endDay > 31) endDay = 31;
    }
    return {
      id: it.id, title: it.title, categoryId: it.categoryId, note: it.note || '',
      month: month, day: day, endMonth: endMonth, endDay: endDay
    };
  }

  // one-time migration: legacy holidays lived in `ranges` with their own `rangeCats`.
  // Fold each range into a regular item under a shaded category, then drop ranges.
  function foldRanges(categories, items, pv, rangeCats, ranges) {
    if (!Array.isArray(ranges) || !ranges.length) return { categories: categories, items: items, pv: pv };
    categories = categories.slice(); items = items.slice(); pv = Object.assign({}, pv);
    rangeCats = Array.isArray(rangeCats) ? rangeCats : [];
    var hasCat = {}; categories.forEach(function (c) { hasCat[c.id] = true; });
    var hasItem = {}; items.forEach(function (it) { hasItem[it.id] = true; });
    function ensureCat(catId, type) {
      if (hasCat[catId]) return;
      var rc = rangeCats.find(function (c) { return c.id === catId; });
      var name = rc ? rc.name : (type === 'vacation' ? 'Vacation' : 'Public holiday');
      var color = (rc && rc.color) ? rc.color : (type === 'vacation' ? COLOR_VACATION : COLOR_HOLIDAY);
      categories.push({ id: catId, name: name, color: color, shade: true });
      pv[catId] = true; hasCat[catId] = true;
    }
    ranges.forEach(function (r) {
      var type = r.type || (r.catId === 'rc_vacation' ? 'vacation' : 'holiday');
      var catId = r.catId || (type === 'vacation' ? 'rc_vacation' : 'rc_holiday');
      ensureCat(catId, type);
      if (hasItem[r.id]) return;
      var planned = r.startMonth != null && r.startDay != null && r.endMonth != null && r.endDay != null;
      items.push({
        id: r.id, title: r.title || 'Untitled', categoryId: catId, note: r.note || '',
        month: planned ? r.startMonth : null, day: planned ? r.startDay : null,
        endMonth: planned ? r.endMonth : null, endDay: planned ? r.endDay : null
      });
      hasItem[r.id] = true;
    });
    return { categories: categories, items: items, pv: pv };
  }

  function loadState() {
    var base = buildDefault();
    var runtime = {
      draggingId: null, editorId: null,
      addTitle: '', addCategoryId: 'c_work',
      palette: 'default', compact: false, showBalance: true,
      sidebarCollapsed: false,
      catEditor: null,
    };
    try {
      var raw = localStorage.getItem(STORE);
      if (raw) {
        var s = JSON.parse(raw);
        if (Array.isArray(s.categories) && s.categories.length) base.categories = s.categories.map(normCat);
        if (s.items && s.items[0] && ('categoryId' in s.items[0])) base.items = s.items.map(normalizeItem);
        base.pv = {}; base.categories.forEach(function (c) { base.pv[c.id] = true; });
        if (s.pv) base.pv = Object.assign(base.pv, s.pv);
        // migrate legacy holidays (ranges) into shaded-category items
        var folded = foldRanges(base.categories, base.items, base.pv, s.rangeCats, s.ranges);
        base.categories = folded.categories; base.items = folded.items; base.pv = folded.pv;
        if (s.addCategoryId) runtime.addCategoryId = s.addCategoryId;
        if (s.palette && PALETTES[s.palette]) runtime.palette = s.palette;
        if (typeof s.compact === 'boolean') runtime.compact = s.compact;
        if (typeof s.showBalance === 'boolean') runtime.showBalance = s.showBalance;
        if (typeof s.sidebarCollapsed === 'boolean') runtime.sidebarCollapsed = s.sidebarCollapsed;
      }
    } catch (e) {}
    if (!base.categories.some(function (c) { return c.id === runtime.addCategoryId; })) {
      runtime.addCategoryId = base.categories[0] ? base.categories[0].id : 'c_work';
    }
    return Object.assign(base, runtime);
  }

  var state = loadState();

  function snapshot() {
    return {
      categories: state.categories,
      items: state.items, pv: state.pv, addCategoryId: state.addCategoryId,
      palette: state.palette, compact: state.compact, showBalance: state.showBalance,
      sidebarCollapsed: state.sidebarCollapsed
    };
  }

  function persist() {
    var snap = snapshot();
    try { localStorage.setItem(STORE, JSON.stringify(snap)); } catch (e) {}
    cloudPush(snap);
  }

  // ----------------------------------------------------------- cloud sync ops
  var cloudTimer = null;
  function cloudPush(snap) {
    if (!sb) return;
    clearTimeout(cloudTimer);
    cloudTimer = setTimeout(function () {
      sb.from('year_canvas')
        .upsert({ id: CLOUD_ROW_ID, data: snap, updated_at: new Date().toISOString() })
        .then(function (res) { if (res.error) console.warn('Supabase save failed:', res.error.message); });
    }, 600);
  }

  function applyRemote(s) {
    if (Array.isArray(s.categories) && s.categories.length) state.categories = s.categories.map(normCat);
    if (s.items && s.items[0] && ('categoryId' in s.items[0])) state.items = s.items.map(normalizeItem);
    var pv = {}; state.categories.forEach(function (c) { pv[c.id] = true; });
    state.pv = Object.assign(pv, s.pv || {});
    // migrate legacy holidays (ranges) coming from an older client
    var folded = foldRanges(state.categories, state.items, state.pv, s.rangeCats, s.ranges);
    state.categories = folded.categories; state.items = folded.items; state.pv = folded.pv;
    if (s.addCategoryId) state.addCategoryId = s.addCategoryId;
    if (s.palette && PALETTES[s.palette]) state.palette = s.palette;
    if (typeof s.compact === 'boolean') state.compact = s.compact;
    if (typeof s.showBalance === 'boolean') state.showBalance = s.showBalance;
    if (typeof s.sidebarCollapsed === 'boolean') state.sidebarCollapsed = s.sidebarCollapsed;
    if (!state.categories.some(function (c) { return c.id === state.addCategoryId; })) {
      state.addCategoryId = state.categories[0] ? state.categories[0].id : 'c_work';
    }
  }

  function cloudPull() {
    if (!sb) return;
    sb.from('year_canvas').select('data').eq('id', CLOUD_ROW_ID).maybeSingle()
      .then(function (res) {
        if (res.error) { console.warn('Supabase load failed:', res.error.message); return; }
        var s = res.data && res.data.data;
        if (!s) { cloudPush(snapshot()); return; } // first run: seed cloud from local/default
        applyRemote(s);
        render();
      });
  }

  // ----------------------------------------------------------------- lookups
  function palette() { return PALETTES[state.palette] || PALETTES.default; }
  function catById(id) { return state.categories.find(function (c) { return c.id === id; }); }
  function catColor(id) {
    var c = catById(id);
    if (c && c.color) return oklchStr(c.color);
    var b = palette()[id];
    if (b) return oklchStr(b);
    return '#6E737E';
  }
  function catColorObj(id) {
    var c = catById(id);
    if (c && c.color) return c.color;
    return palette()[id] || SWATCHES[0];
  }
  function visibleItems() { return state.items.filter(function (it) { return state.pv[it.categoryId] !== false; }); }
  function isWeekend(m, d) { var wd = new Date(YEAR, m, d).getDay(); return wd === 0 || wd === 6; }

  // ----------------------------------------------------------------- dates
  function ord(m, d) { var t = 0; for (var i = 0; i < m; i++) t += DIM[i]; return t + d; } // day-of-year
  function fromOrd(o) {
    if (o < 1) o = 1; if (o > 365) o = 365;
    var m = 0;
    while (m < 11 && o > DIM[m]) { o -= DIM[m]; m++; }
    return { m: m, d: o };
  }
  function shadeTint(color) { return 'color-mix(in oklab, ' + color + ' 15%, #ffffff)'; }
  // weekend cell within a shaded span: tint the event color into grey (not white) so
  // the darker grey still reads as a weekend while keeping the event's hue.
  function shadeTintWeekend(color) { return 'color-mix(in oklab, ' + color + ' 18%, #DFE2E7)'; }
  function shadeBand(color) { return 'color-mix(in oklab, ' + color + ' 45%, #ffffff)'; } // left-25% band overlay color
  function clampDay(m, d) { d = parseInt(d, 10); if (isNaN(d) || d < 1) d = 1; if (d > DIM[m]) d = DIM[m]; return d; }
  function spanDays(sm, sd, em, ed) { return ord(em, ed) - ord(sm, sd) + 1; }
  function formatSpan(sm, sd, em, ed) {
    if (sm === em && sd === ed) return MONTHS_SHORT[sm] + ' ' + sd;
    if (sm === em) return MONTHS_SHORT[sm] + ' ' + sd + ' – ' + ed;
    return MONTHS_SHORT[sm] + ' ' + sd + ' – ' + MONTHS_SHORT[em] + ' ' + ed;
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ----------------------------------------------------------------- mutations: items
  function updateItem(id, patch) {
    state.items = state.items.map(function (it) { return it.id === id ? Object.assign({}, it, patch) : it; });
    persist();
  }
  function toggleCategory(cid) {
    state.pv = Object.assign({}, state.pv); state.pv[cid] = !state.pv[cid];
    persist(); render();
  }
  function resetFilters() {
    var pv = {}; state.categories.forEach(function (c) { pv[c.id] = true; });
    state.pv = pv; persist(); render();
  }
  function toggleSidebar() {
    state.sidebarCollapsed = !state.sidebarCollapsed; persist(); render();
  }
  function addItem() {
    var title = (state.addTitle || '').trim();
    if (!title) return;
    var it = { id: 'it_' + Date.now(), title: title, categoryId: state.addCategoryId, note: '', month: null, day: null, endMonth: null, endDay: null };
    state.items = state.items.concat([it]);
    state.addTitle = '';
    persist(); render();
  }
  function dropToCell(m, d) {
    var id = state.draggingId; if (id == null) return;
    // keep an event's duration when it's moved; backlog items land as a single day
    var it = state.items.find(function (x) { return x.id === id; });
    var dur = (it && it.month != null) ? spanDays(it.month, it.day, (it.endMonth == null ? it.month : it.endMonth), (it.endDay == null ? it.day : it.endDay)) : 1;
    var e = fromOrd(ord(m, d) + dur - 1);
    updateItem(id, { month: m, day: d, endMonth: e.m, endDay: e.d });
    state.draggingId = null; render();
  }
  function dropToBacklog() {
    var id = state.draggingId; if (id == null) return;
    updateItem(id, { month: null, day: null, endMonth: null, endDay: null });
    state.draggingId = null; render();
  }
  function deleteItem(id) {
    state.items = state.items.filter(function (it) { return it.id !== id; });
    state.editorId = null; persist(); render();
  }
  function scheduleItem(id) {
    updateItem(id, { month: TODAY_M, day: TODAY_D, endMonth: TODAY_M, endDay: TODAY_D });
    render();
  }
  function updateItemDates(id, field, raw, doRender) {
    var it = state.items.find(function (x) { return x.id === id; });
    if (!it || it.month == null) return;
    var sm = it.month, sd = it.day;
    var em = (it.endMonth == null ? it.month : it.endMonth), ed = (it.endDay == null ? it.day : it.endDay);
    if (field === 'startMonth') { sm = parseInt(raw, 10); sd = clampDay(sm, sd); }
    else if (field === 'startDay') { sd = clampDay(sm, raw); }
    else if (field === 'endMonth') { em = parseInt(raw, 10); ed = clampDay(em, ed); }
    else if (field === 'endDay') { ed = clampDay(em, raw); }
    // forgiving: if the end lands before the start, snap the end to the start
    if (ord(em, ed) < ord(sm, sd)) { em = sm; ed = sd; }
    updateItem(id, { month: sm, day: sd, endMonth: em, endDay: ed });
    if (doRender) render();
  }

  // ----------------------------------------------------------------- mutations: category management
  function nextSwatch() {
    var usedH = state.categories.map(function (c) { return c.color ? c.color.h : null; });
    for (var i = 0; i < SWATCHES.length; i++) { if (usedH.indexOf(SWATCHES[i].h) === -1) return SWATCHES[i]; }
    return SWATCHES[state.categories.length % SWATCHES.length];
  }
  function openCatNew() {
    state.catEditor = { id: null, name: '', color: nextSwatch(), shade: false, partial: false };
    state.editorId = null; render();
  }
  function openCatEdit(id) {
    var c = catById(id);
    if (!c) return;
    state.catEditor = { id: id, name: c.name, color: catColorObj(id), shade: !!c.shade, partial: !!c.partial };
    state.editorId = null; render();
  }
  function closeCat() { state.catEditor = null; render(); }
  function saveCat() {
    var ce = state.catEditor; if (!ce) return;
    var name = (ce.name || '').trim() || 'Category';
    var partial = !!ce.shade && !!ce.partial; // partial only meaningful when shading
    if (ce.id) state.categories = state.categories.map(function (c) { return c.id === ce.id ? Object.assign({}, c, { name: name, color: ce.color, shade: !!ce.shade, partial: partial }) : c; });
    else {
      var id = 'c_' + Date.now();
      state.categories = state.categories.concat([{ id: id, name: name, color: ce.color, shade: !!ce.shade, partial: partial }]);
      state.pv = Object.assign({}, state.pv); state.pv[id] = true;
    }
    state.catEditor = null; persist(); render();
  }
  function deleteCat() {
    var ce = state.catEditor; if (!ce || !ce.id) return;
    if (state.categories.length <= 1) return; // keep at least one
    var rest = state.categories.filter(function (c) { return c.id !== ce.id; });
    var fb = rest[0].id;
    state.items = state.items.map(function (it) { return it.categoryId === ce.id ? Object.assign({}, it, { categoryId: fb }) : it; });
    state.categories = rest;
    if (state.addCategoryId === ce.id) state.addCategoryId = fb;
    var pv = Object.assign({}, state.pv); delete pv[ce.id]; state.pv = pv;
    state.catEditor = null; persist(); render();
  }

  // ----------------------------------------------------------------- view model
  function itemView(it) {
    var c = catById(it.categoryId);
    var color = catColor(it.categoryId);
    return {
      id: it.id, title: it.title, note: it.note || '', color: color,
      chipBg: 'color-mix(in oklab, ' + color + ' 17%, #ffffff)',
      chipText: 'color-mix(in oklab, ' + color + ' 64%, #181b22)',
      catName: c ? c.name : ''
    };
  }

  function computeVals() {
    var S = state;
    var vis = visibleItems();

    var catCount = {}, monthCount = {};
    S.items.forEach(function (it) {
      if (S.pv[it.categoryId] === false) return;
      catCount[it.categoryId] = (catCount[it.categoryId] || 0) + 1;
      if (it.month != null) monthCount[it.month] = (monthCount[it.month] || 0) + 1;
    });

    // scheduled items, each with its inclusive day-of-year coverage. Shaded-category
    // items tint the day; the rest render as chips.
    var sched = [];
    vis.forEach(function (it) {
      if (it.month == null) return;
      var lo = ord(it.month, it.day || 1);
      var em = (it.endMonth == null ? it.month : it.endMonth);
      var ed = (it.endDay == null ? (it.day || 1) : it.endDay);
      var hi = ord(em, ed);
      if (hi < lo) { var t = lo; lo = hi; hi = t; }
      var cat = catById(it.categoryId);
      sched.push({ lo: lo, hi: hi, view: itemView(it), id: it.id, title: it.title, shade: !!(cat && cat.shade), partial: !!(cat && cat.partial), color: catColor(it.categoryId) });
    });

    var backlogItems = vis.filter(function (it) { return it.month == null; }).map(itemView);

    var monthsHeader = MONTHS_SHORT.map(function (name, idx) {
      var isToday = idx === TODAY_M;
      var c = monthCount[idx] || 0;
      return {
        name: name, idx: idx, today: isToday,
        bg: isToday ? '#E4ECFC' : '#F4F5F8',
        color: isToday ? '#23459E' : '#4E5460',
        countLabel: c > 0 ? (c + (c === 1 ? ' item' : ' items')) : ''
      };
    });

    var rows = [];
    for (var d = 1; d <= 31; d++) {
      var cells = [];
      for (var m = 0; m < 12; m++) {
        var valid = d <= DIM[m];
        var weekend = valid && isWeekend(m, d);
        var isToday = valid && m === TODAY_M && d === TODAY_D;
        var od = valid ? ord(m, d) : 0;

        // shaded-category items: full shades tint the whole cell; quarter shades draw a
        // thin band down the left 25% that layers over a full shade. Both label the start day.
        // normal items: full chip on the start day, continuation bar otherwise.
        var coverColor = null, bandColor = null, shadeLabels = [], cellItems = [];
        if (valid) {
          for (var si = 0; si < sched.length; si++) {
            var s = sched[si];
            if (s.lo <= od && od <= s.hi) {
              if (s.shade) {
                if (s.partial) { if (!bandColor) bandColor = s.color; }
                else if (!coverColor) coverColor = s.color;
                if (od === s.lo) shadeLabels.push({ id: s.id, title: s.title, color: s.color, partial: s.partial });
              } else {
                cellItems.push({ v: s.view, start: od === s.lo });
              }
            }
          }
        }

        var base = !valid ? '#DBDDE1' : (coverColor ? (weekend ? shadeTintWeekend(coverColor) : shadeTint(coverColor)) : (weekend ? '#EDEFF2' : '#FFFFFF'));
        if (isToday && !coverColor) base = '#E8F0FE'; // tint today when it isn't already shaded
        var bg = bandColor
          ? 'linear-gradient(to right, ' + shadeBand(bandColor) + ' 0%, ' + shadeBand(bandColor) + ' 25%, transparent 25%, transparent 100%), ' + base
          : base;
        cells.push({
          valid: valid, items: cellItems, shadeLabels: shadeLabels, bg: bg, m: m, d: d, today: isToday,
          ring: isToday ? 'inset 0 0 0 2px ' + TODAY_ACCENT : 'none'
        });
      }
      rows.push({ day: d, cells: cells });
    }

    var categoryTree = S.categories.map(function (c) {
      var on = S.pv[c.id] !== false;
      var color = catColor(c.id);
      return {
        id: c.id, name: c.name, count: catCount[c.id] || 0, shade: !!c.shade, partial: !!c.partial,
        swatchBg: on ? color : '#fff',
        swatchBorder: on ? color : '#C9CDD5',
        mark: on ? '✓' : '',
        textColor: on ? '#2A2E38' : '#B7BCC5'
      };
    });

    var schedVis = vis.filter(function (it) { return it.month != null; });
    var total = schedVis.length;
    var balanceSegments = S.categories.map(function (c) {
      var n = schedVis.filter(function (it) { return it.categoryId === c.id; }).length;
      return {
        id: c.id, name: c.name, color: catColor(c.id), count: n,
        pct: total ? (n / total * 100).toFixed(2) : 0,
        label: total ? (n + ' · ' + Math.round(n / total * 100) + '%') : '0'
      };
    }).filter(function (x) { return x.count > 0; });

    var categoryOptions = S.categories.map(function (c) { return { id: c.id, label: c.name }; });

    var editItem = S.editorId ? S.items.find(function (it) { return it.id === S.editorId; }) : null;
    var editor = null;
    if (editItem) {
      var ec = catById(editItem.categoryId);
      var esched = editItem.month != null;
      var eem = (editItem.endMonth == null ? editItem.month : editItem.endMonth);
      var eed = (editItem.endDay == null ? editItem.day : editItem.endDay);
      editor = {
        id: editItem.id, title: editItem.title, note: editItem.note || '', categoryId: editItem.categoryId,
        color: catColor(editItem.categoryId), catName: ec ? ec.name : '',
        scheduled: esched,
        startMonth: editItem.month, startDay: editItem.day, endMonth: eem, endDay: eed,
        spanText: esched ? formatSpan(editItem.month, editItem.day, eem, eed) : '',
        days: esched ? Math.max(1, ord(eem, eed) - ord(editItem.month, editItem.day) + 1) : 0,
        placement: esched ? formatSpan(editItem.month, editItem.day, eem, eed) : ''
      };
    }

    // category editor view
    var catEd = null;
    if (state.catEditor) {
      var ce = state.catEditor;
      var refCount = ce.id ? S.items.filter(function (it) { return it.categoryId === ce.id; }).length : 0;
      catEd = {
        id: ce.id, isNew: !ce.id, name: ce.name, shade: !!ce.shade, partial: !!ce.partial,
        colorStr: oklchStr(ce.color),
        title: (ce.id ? 'Edit category' : 'New category'),
        deletable: !!ce.id && S.categories.length > 1,
        refCount: refCount, refLabel: refCount === 1 ? 'item' : 'items',
        swatches: SWATCHES.map(function (sw, i) { return { idx: i, str: oklchStr(sw), sel: sameColor(sw, ce.color) }; })
      };
    }

    return {
      yearLabel: String(YEAR),
      todayLabel: MONTHS_SHORT[TODAY_M] + ' ' + TODAY_D,
      scheduledCount: schedVis.length,
      backlogCount: backlogItems.length,
      showBalance: S.showBalance,
      monthsHeader: monthsHeader, rows: rows,
      backlogItems: backlogItems, backlogEmpty: backlogItems.length === 0,
      categoryTree: categoryTree,
      balanceSegments: balanceSegments, balanceEmpty: balanceSegments.length === 0,
      balanceCaption: total ? (total + ' scheduled') : '',
      categoryOptions: categoryOptions,
      addTitle: S.addTitle, addCategoryId: S.addCategoryId,
      editorOpen: !!editor, editor: editor,
      catEditorOpen: !!catEd, catEd: catEd
    };
  }

  // ----------------------------------------------------------------- render helpers
  function optionsHtml(opts, selected) {
    return opts.map(function (o) {
      return '<option value="' + esc(o.id) + '"' + (o.id === selected ? ' selected' : '') + '>' + esc(o.label) + '</option>';
    }).join('');
  }
  function monthOptions(sel) {
    return MONTHS_SHORT.map(function (n, i) { return '<option value="' + i + '"' + (i === sel ? ' selected' : '') + '>' + n + '</option>'; }).join('');
  }
  var DATE_FIELD_STYLE = 'border:1px solid #E4E6EB; background:#FBFBFC; border-radius:10px; padding:9px 10px; font-size:13.5px; color:#1B1E26;';

  function dateRangeFields(prefix, startMonth, startDay, endMonth, endDay) {
    return '<div style="display:flex; gap:14px; margin-bottom:10px;">'
      +   '<div style="flex:1; min-width:0;">'
      +     '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">Start</label>'
      +     '<div style="display:flex; gap:7px;">'
      +       '<select data-field="' + prefix + 'StartMonth" style="flex:1; min-width:0; ' + DATE_FIELD_STYLE + '">' + monthOptions(startMonth) + '</select>'
      +       '<input type="number" data-field="' + prefix + 'StartDay" min="1" max="' + DIM[startMonth] + '" value="' + esc(startDay) + '" style="width:58px; ' + DATE_FIELD_STYLE + '" />'
      +     '</div>'
      +   '</div>'
      +   '<div style="flex:1; min-width:0;">'
      +     '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">End</label>'
      +     '<div style="display:flex; gap:7px;">'
      +       '<select data-field="' + prefix + 'EndMonth" style="flex:1; min-width:0; ' + DATE_FIELD_STYLE + '">' + monthOptions(endMonth) + '</select>'
      +       '<input type="number" data-field="' + prefix + 'EndDay" min="1" max="' + DIM[endMonth] + '" value="' + esc(endDay) + '" style="width:58px; ' + DATE_FIELD_STYLE + '" />'
      +     '</div>'
      +   '</div>'
      + '</div>';
  }

  function render() {
    var v = computeVals();
    var html = '';

    html += '<div class="' + (state.compact ? 'compact ' : '') + 'root" style="display:flex; height:100vh; width:100%; overflow:hidden;">';

    // ============ SIDEBAR ============
    if (!state.sidebarCollapsed) {
    html += '<aside style="width:312px; flex:0 0 312px; height:100%; background:#FFFFFF; border-right:1px solid #DADCE2; display:flex; flex-direction:column;">';
    html += '<div style="padding:20px 20px 15px; border-bottom:1px solid #E7E8ED;">'
          +   '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">'
          +     '<div style="display:flex; align-items:baseline; gap:8px; min-width:0;">'
          +       '<div style="font-size:17px; font-weight:700; letter-spacing:-0.01em;">Year Canvas</div>'
          +       '<div style="font-size:12.5px; color:#6E737E; font-weight:500;">' + esc(v.yearLabel) + '</div>'
          +     '</div>'
          +     '<button class="collapse-btn" data-action="toggle-sidebar" title="Collapse sidebar" aria-label="Collapse sidebar" style="flex:0 0 auto; width:28px; height:28px; border:1px solid #DCDEE3; background:#fff; color:#5A606C; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; line-height:1;">«</button>'
          +   '</div>'
          +   '<div style="font-size:12.5px; color:#6E737E; margin-top:2px;">Your whole year at a glance</div>'
          + '</div>';

    html += '<div style="flex:1; min-height:0; overflow-y:auto; padding:16px 16px 24px;">';

    // Quick add
    html += '<div style="margin-bottom:20px;">'
          +   '<div style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#6E737E; margin-bottom:9px;">Add to backlog</div>'
          +   '<input type="text" data-field="addTitle" value="' + esc(v.addTitle) + '" placeholder="New item…" style="width:100%; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:10px; padding:9px 11px; font-size:13.5px; color:#1B1E26; margin-bottom:7px;" />'
          +   '<div style="display:flex; gap:7px;">'
          +     '<select data-field="addCategory" style="flex:1; min-width:0; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:10px; padding:8px 9px; font-size:12.5px; color:#4B5160;">' + optionsHtml(v.categoryOptions, v.addCategoryId) + '</select>'
          +     '<button class="add-btn" data-action="add" style="flex:0 0 auto; border:none; background:#1B1E26; color:#fff; border-radius:10px; padding:0 15px; font-size:13px; font-weight:600; cursor:pointer;">Add</button>'
          +   '</div>'
          + '</div>';

    // Backlog
    html += '<div style="margin-bottom:22px;">'
          +   '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;">'
          +     '<div style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#6E737E;">Backlog</div>'
          +     '<div style="font-size:11.5px; font-weight:600; color:#6E737E; background:#F3F4F6; border-radius:20px; padding:2px 8px;">' + v.backlogCount + '</div>'
          +   '</div>'
          +   '<div class="backlog-drop" data-drop="backlog" style="border-radius:12px; padding:6px; min-height:64px; transition:background .12s,box-shadow .12s; background:#FAFAFB; box-shadow:inset 0 0 0 1px #F0F1F4;">';
    v.backlogItems.forEach(function (it) {
      html += '<div class="backlog-item" draggable="true" data-id="' + esc(it.id) + '" data-action="edit" title="' + esc(it.title) + '" style="display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:9px; cursor:grab; background:#fff; border:1px solid #EEEFF2; margin:4px 0; box-shadow:0 1px 1.5px rgba(16,24,40,.04);">'
            +   '<span style="flex:0 0 auto; width:9px; height:9px; border-radius:50%; background:' + it.color + ';"></span>'
            +   '<span style="flex:1; min-width:0; font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + esc(it.title) + '</span>'
            +   '<span style="flex:0 0 auto; font-size:11px; color:#A7ACB6; font-weight:500;">' + esc(it.catName) + '</span>'
            + '</div>';
    });
    if (v.backlogEmpty) {
      html += '<div style="text-align:center; color:#B7BCC5; font-size:12.5px; padding:18px 8px;">Backlog clear — drag items here to unschedule</div>';
    }
    html += '</div></div>';

    // Categories (filter + manage). A shaded category tints the whole day on the grid.
    html += '<div style="margin-bottom:22px;">'
          +   '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;">'
          +     '<div style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#6E737E;">Categories</div>'
          +     '<div style="display:flex; align-items:center; gap:10px;">'
          +       '<button class="subadd-btn" data-action="add-cat" style="border:1px solid #E9EAEE; background:#fff; color:#7E8490; font-size:11px; font-weight:600; cursor:pointer; padding:2px 8px; border-radius:7px;">+ Add</button>'
          +       '<button class="reset-btn" data-action="reset" style="border:none; background:none; color:#A7ACB6; font-size:11.5px; font-weight:600; cursor:pointer; padding:0;">Reset</button>'
          +     '</div>'
          +   '</div>';
    v.categoryTree.forEach(function (cat) {
      html += '<div class="cat-row" style="display:flex; align-items:center; gap:10px; padding:6px 3px; border-radius:8px; user-select:none;">'
            +   '<span data-action="toggle" data-id="' + esc(cat.id) + '" style="flex:0 0 auto; width:15px; height:15px; border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:' + cat.swatchBg + '; border:1.5px solid ' + cat.swatchBorder + ';">'
            +     '<span style="color:#fff; font-size:10px; font-weight:800; line-height:1;">' + cat.mark + '</span>'
            +   '</span>'
            +   '<span data-action="toggle" data-id="' + esc(cat.id) + '" style="flex:1; cursor:pointer; font-size:13.5px; font-weight:600; color:' + cat.textColor + ';">' + esc(cat.name) + (cat.shade ? ' <span title="' + (cat.partial ? 'Shades a quarter band (layers over full-day shades)' : 'Shades the whole day') + '" style="font-weight:400; color:#B7BCC5; font-size:11px;">' + (cat.partial ? '▎' : '▦') + '</span>' : '') + '</span>'
            +   '<span class="cat-edit" data-action="edit-cat" data-id="' + esc(cat.id) + '" title="Edit category" style="flex:0 0 auto; font-size:12px; color:#B0B5BE;">✎</span>'
            +   '<span style="flex:0 0 auto; font-size:11px; color:#B7BCC5; font-weight:600;">' + cat.count + '</span>'
            + '</div>';
    });
    html += '</div>';

    // Balance
    if (v.showBalance) {
      html += '<div>'
            +   '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">'
            +     '<div style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#6E737E;">Balance</div>'
            +     '<div style="font-size:11px; color:#B7BCC5; font-weight:500;">' + esc(v.balanceCaption) + '</div>'
            +   '</div>'
            +   '<div style="display:flex; height:10px; border-radius:20px; overflow:hidden; background:#F0F1F4;">';
      v.balanceSegments.forEach(function (seg) {
        html += '<div style="height:100%; width:' + seg.pct + '%; background:' + seg.color + ';"></div>';
      });
      html += '</div><div style="display:flex; flex-direction:column; gap:6px; margin-top:11px;">';
      v.balanceSegments.forEach(function (seg) {
        html += '<div style="display:flex; align-items:center; gap:8px;">'
              +   '<span style="width:8px; height:8px; border-radius:50%; background:' + seg.color + ';"></span>'
              +   '<span style="flex:1; font-size:12.5px; color:#5A606C; font-weight:500;">' + esc(seg.name) + '</span>'
              +   '<span style="font-size:12px; color:#6E737E; font-weight:600;">' + esc(seg.label) + '</span>'
              + '</div>';
      });
      html += '</div>';
      if (v.balanceEmpty) {
        html += '<div style="font-size:12.5px; color:#B7BCC5; margin-top:8px;">Nothing scheduled yet.</div>';
      }
      html += '</div>';
    }

    html += '</div></aside>';
    } // end sidebar

    // ============ MAIN ============
    html += '<main style="flex:1; min-width:0; height:100%; display:flex; flex-direction:column;">';

    // Top bar
    html += '<div style="flex:0 0 auto; height:58px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; border-bottom:1px solid #DADCE2; background:#F4F5F8;">'
          +   '<div style="display:flex; align-items:center; gap:11px; min-width:0;">'
          +     (state.sidebarCollapsed
                  ? '<button class="collapse-btn" data-action="toggle-sidebar" title="Show sidebar" aria-label="Show sidebar" style="flex:0 0 auto; width:30px; height:30px; border:1px solid #DCDEE3; background:#fff; color:#4E5460; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; line-height:1;">☰</button>'
                  : '')
          +     '<div style="font-size:17px; font-weight:700; letter-spacing:-0.01em;">' + esc(v.yearLabel) + '</div>'
          +     '<div style="font-size:13px; color:#6E737E;">Year planner</div>'
          +   '</div>'
          +   '<div style="display:flex; align-items:center; gap:16px;">'
          +     '<div style="font-size:12.5px; color:#7C818C;">Drag from backlog onto any day · drag back to unschedule</div>'
          +     '<div style="font-size:12.5px; color:#5A606C; font-weight:600;">' + v.scheduledCount + ' scheduled</div>'
          +     '<button class="today-btn" data-action="scroll-today" title="Jump to today" style="display:flex; align-items:center; gap:7px; border:1px solid #C6D2F0; background:#EEF2FB; color:#23459E; font-size:12.5px; font-weight:700; cursor:pointer; padding:5px 12px; border-radius:20px;"><span style="width:7px; height:7px; border-radius:50%; background:' + TODAY_ACCENT + ';"></span>' + esc(v.todayLabel) + '</button>'
          +   '</div>'
          + '</div>';

    // Grid
    html += '<div style="flex:1; min-height:0; overflow:auto; padding:0;">';
    html += '<div style="min-width:920px; min-height:100%; display:flex; flex-direction:column;">';

    // header row
    html += '<div style="flex:0 0 auto; display:flex; position:sticky; top:0; z-index:5;">';
    html += '<div style="flex:0 0 42px; position:sticky; left:0; z-index:6; background:#FAFAFB; border-right:1px solid #E4E6EB; border-bottom:1.5px solid #DCDEE3;"></div>';
    v.monthsHeader.forEach(function (mh) {
      var hb = mh.today ? '2.5px solid ' + TODAY_ACCENT : '1.5px solid #D2D4DA';
      html += '<div style="flex:1 1 0; min-width:66px; padding:9px 6px; text-align:center; background:' + mh.bg + '; border-right:1px solid #DDDFE4; border-bottom:' + hb + ';">'
            +   '<div style="font-size:12px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:' + mh.color + ';">' + esc(mh.name) + '</div>'
            +   '<div style="font-size:10.5px; font-weight:600; color:' + (mh.today ? '#5878CB' : '#9498A1') + '; margin-top:1px;">' + esc(mh.countLabel) + '</div>'
            + '</div>';
    });
    html += '</div>';

    // day rows
    v.rows.forEach(function (row) {
      var todayRow = row.day === TODAY_D;
      html += '<div class="day-row" style="display:flex; flex:1 1 0; min-height:0;">';
      html += '<div class="day-num" style="flex:0 0 42px; position:sticky; left:0; z-index:2; display:flex; align-items:center; justify-content:center; background:' + (todayRow ? '#E4ECFC' : '#F4F5F8') + '; border-right:1px solid ' + (todayRow ? TODAY_ACCENT : '#C2C6CE') + '; border-bottom:1px solid #C8CCD4; font-size:11px; font-weight:' + (todayRow ? '800' : '600') + '; color:' + (todayRow ? '#23459E' : '#71767F') + ';">' + row.day + '</div>';
      row.cells.forEach(function (cell) {
        var dropAttrs = cell.valid ? (' class="cell" data-drop="cell" data-m="' + cell.m + '" data-d="' + cell.d + '"') : ' class="cell"';
        html += '<div' + dropAttrs + (cell.today ? ' data-today="1"' : '') + ' style="flex:1 1 0; min-width:66px; border-right:1px solid #C8CCD4; border-bottom:1px solid #C8CCD4; background:' + cell.bg + '; box-shadow:' + cell.ring + '; padding:2px; display:flex; flex-direction:column; gap:2px;">';
        cell.shadeLabels.forEach(function (rl) {
          html += '<div class="range-label" draggable="true" data-id="' + esc(rl.id) + '" data-action="edit" title="' + esc(rl.title) + '" style="background:' + rl.color + '; color:#fff; font-size:10px; font-weight:700; line-height:1.25; padding:2px 5px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:grab;">' + esc(rl.title) + '</div>';
        });
        cell.items.forEach(function (ci) {
          var it = ci.v;
          if (ci.start) {
            html += '<div class="chip" draggable="true" data-id="' + esc(it.id) + '" data-action="edit" title="' + esc(it.title) + '" style="background:' + it.chipBg + '; color:' + it.chipText + '; border-left:2.5px solid ' + it.color + '; font-size:10.5px; font-weight:600; line-height:1.3; padding:2px 4px 2px 5px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:grab;">' + esc(it.title) + '</div>';
          } else {
            html += '<div class="chip-cont" data-id="' + esc(it.id) + '" data-action="edit" title="' + esc(it.title) + '" style="height:9px; background:' + it.chipBg + '; border-left:2.5px solid ' + it.color + '; border-radius:3px; cursor:pointer;"></div>';
          }
        });
        html += '</div>';
      });
      html += '</div>';
    });

    html += '</div></div></main>';

    // ============ ITEM EDITOR MODAL ============
    if (v.editorOpen) {
      var ed = v.editor;
      html += '<div data-action="overlay-close" style="position:fixed; inset:0; background:rgba(20,24,33,.32); display:flex; align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(1.5px);">'
            +   '<div data-modal-card style="width:430px; max-width:92vw; background:#fff; border-radius:18px; box-shadow:0 24px 64px rgba(16,24,40,.28); overflow:hidden;">'
            +     '<div style="padding:20px 22px 16px; display:flex; align-items:center; gap:11px; border-bottom:1px solid #F0F1F4;">'
            +       '<span style="width:12px; height:12px; border-radius:50%; background:' + ed.color + ';"></span>'
            +       '<div style="flex:1; font-size:12px; font-weight:600; color:#6E737E;">' + esc(ed.catName) + '</div>'
            +       (ed.scheduled ? '<div style="font-size:12px; font-weight:600; color:#6E737E; background:#F3F4F6; border-radius:20px; padding:3px 10px;">' + esc(ed.placement) + '</div>' : '')
            +     '</div>'
            +     '<div style="padding:18px 22px 22px;">'
            +       '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">Title</label>'
            +       '<input type="text" data-field="editTitle" value="' + esc(ed.title) + '" style="width:100%; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:11px; padding:11px 13px; font-size:15px; font-weight:600; color:#1B1E26; margin-bottom:16px;" />'
            +       '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">Category</label>'
            +       '<select data-field="editCategory" style="width:100%; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:11px; padding:11px 13px; font-size:14px; color:#1B1E26; margin-bottom:16px;">' + optionsHtml(v.categoryOptions, ed.categoryId) + '</select>'
            +       '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">When</label>';
      if (ed.scheduled) {
        html += dateRangeFields('edit', ed.startMonth, ed.startDay, ed.endMonth, ed.endDay)
              + '<div style="font-size:12.5px; color:#6E737E; font-weight:500; margin-bottom:16px;">' + esc(ed.spanText) + '  ·  ' + ed.days + (ed.days === 1 ? ' day' : ' days') + ' — set a later end for a multi-day event</div>';
      } else {
        html += '<div style="display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:10px 12px; background:#FAFAFB; border:1px solid #EEEFF2; border-radius:11px;">'
              +   '<span style="flex:1; font-size:12.5px; color:#6E737E; font-weight:500;">In backlog — not on the calendar yet</span>'
              +   '<button class="tobacklog-btn" data-action="schedule-item" style="border:1px solid #E4E6EB; background:#fff; color:#5A606C; font-size:12.5px; font-weight:600; cursor:pointer; padding:6px 11px; border-radius:9px;">Add to calendar</button>'
              + '</div>';
      }
      html += '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">Note</label>'
            +       '<textarea data-field="editNote" placeholder="Add a short note…" style="width:100%; min-height:74px; resize:vertical; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:11px; padding:11px 13px; font-size:13.5px; color:#4B5160; line-height:1.5; box-sizing:border-box; display:block;">' + esc(ed.note) + '</textarea>'
            +     '</div>'
            +     '<div style="display:flex; align-items:center; gap:9px; padding:14px 22px; border-top:1px solid #F0F1F4; background:#FAFAFB;">'
            +       '<button class="delete-btn" data-action="delete" style="border:none; background:none; color:#C0392B; font-size:13px; font-weight:600; cursor:pointer; padding:8px 4px;">Delete</button>'
            +       (ed.scheduled ? '<button class="tobacklog-btn" data-action="unschedule" style="border:1px solid #E4E6EB; background:#fff; color:#5A606C; font-size:13px; font-weight:600; cursor:pointer; padding:8px 14px; border-radius:9px;">To backlog</button>' : '')
            +       '<span style="flex:1;"></span>'
            +       '<button class="done-btn" data-action="close" style="border:none; background:#1B1E26; color:#fff; font-size:13px; font-weight:600; cursor:pointer; padding:9px 20px; border-radius:9px;">Done</button>'
            +     '</div>'
            +   '</div>'
            + '</div>';
    }

    // ============ CATEGORY EDITOR MODAL ============
    if (v.catEditorOpen) {
      var ce = v.catEd;
      html += '<div data-action="cat-overlay-close" style="position:fixed; inset:0; background:rgba(20,24,33,.32); display:flex; align-items:center; justify-content:center; z-index:55; backdrop-filter:blur(1.5px);">'
            +   '<div data-modal-card style="width:400px; max-width:92vw; background:#fff; border-radius:18px; box-shadow:0 24px 64px rgba(16,24,40,.28); overflow:hidden;">'
            +     '<div style="padding:20px 22px 16px; display:flex; align-items:center; gap:11px; border-bottom:1px solid #F0F1F4;">'
            +       '<span style="width:12px; height:12px; border-radius:4px; background:' + ce.colorStr + ';"></span>'
            +       '<div style="flex:1; font-size:12px; font-weight:600; color:#6E737E;">' + esc(ce.title) + '</div>'
            +     '</div>'
            +     '<div style="padding:18px 22px 22px;">'
            +       '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:7px;">Name</label>'
            +       '<input type="text" data-field="catName" value="' + esc(ce.name) + '" placeholder="e.g. Fitness, Public holiday" style="width:100%; border:1px solid #E4E6EB; background:#FBFBFC; border-radius:11px; padding:11px 13px; font-size:15px; font-weight:600; color:#1B1E26; margin-bottom:16px;" />'
            +       '<label style="display:block; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6E737E; margin-bottom:9px;">Color</label>'
            +       '<div style="display:flex; flex-wrap:wrap; gap:9px;">';
      ce.swatches.forEach(function (sw) {
        html += '<span class="swatch" data-action="pick-swatch" data-idx="' + sw.idx + '" style="width:26px; height:26px; border-radius:7px; cursor:pointer; background:' + sw.str + '; transition:transform .1s; box-shadow:' + (sw.sel ? '0 0 0 2px #fff, 0 0 0 4px ' + sw.str : 'inset 0 0 0 1px rgba(0,0,0,.06)') + ';"></span>';
      });
      html += '</div>'
            +       '<label class="topbar-ctl" style="display:flex; align-items:center; gap:9px; margin-top:18px; font-size:13.5px; font-weight:600; color:#2A2E38; user-select:none;"><input type="checkbox" data-field="catShade"' + (ce.shade ? ' checked' : '') + ' /> Shade the day instead of a chip</label>'
            +       '<div style="font-size:12px; color:#B0B5BE; font-weight:500; margin-top:5px;">For holidays, vacations &amp; time off — events tint the day instead of showing a chip.</div>';
      if (ce.shade) {
        html += '<div style="margin-top:13px; display:flex; flex-direction:column; gap:10px; padding:12px 13px; background:#FAFAFB; border:1px solid #EEEFF2; border-radius:11px;">'
              +   '<label class="topbar-ctl" style="display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:#2A2E38; user-select:none;"><input type="radio" name="shadeAmt" data-field="catShadeAmt" value="full"' + (ce.partial ? '' : ' checked') + ' /> Whole day</label>'
              +   '<label class="topbar-ctl" style="display:flex; align-items:flex-start; gap:9px; font-size:13px; font-weight:600; color:#2A2E38; user-select:none;"><input type="radio" name="shadeAmt" data-field="catShadeAmt" value="quarter"' + (ce.partial ? ' checked' : '') + ' style="margin-top:2px; flex:0 0 auto;" /><span>Quarter band <span style="font-weight:400; color:#6E737E;">— a thin strip down the left that layers on top of full-day shades, so an overlapping vacation stays visible</span></span></label>'
              + '</div>';
      }
      if (ce.id && ce.refCount > 0) {
        html += '<div style="font-size:12px; color:#B0B5BE; font-weight:500; margin-top:14px;">Deleting moves its ' + ce.refCount + ' ' + ce.refLabel + ' to another category.</div>';
      }
      html += '</div>'
            +     '<div style="display:flex; align-items:center; gap:9px; padding:14px 22px; border-top:1px solid #F0F1F4; background:#FAFAFB;">'
            +       (ce.deletable ? '<button class="delete-btn" data-action="delete-cat" style="border:none; background:none; color:#C0392B; font-size:13px; font-weight:600; cursor:pointer; padding:8px 4px;">Delete</button>' : '')
            +       '<span style="flex:1;"></span>'
            +       '<button class="tobacklog-btn" data-action="cat-close" style="border:1px solid #E4E6EB; background:#fff; color:#5A606C; font-size:13px; font-weight:600; cursor:pointer; padding:8px 14px; border-radius:9px;">Cancel</button>'
            +       '<button class="done-btn" data-action="save-cat" style="border:none; background:#1B1E26; color:#fff; font-size:13px; font-weight:600; cursor:pointer; padding:9px 20px; border-radius:9px;">' + (ce.isNew ? 'Add' : 'Save') + '</button>'
            +     '</div>'
            +   '</div>'
            + '</div>';
    }

    html += '</div>';

    document.getElementById('app').innerHTML = html;
  }

  // ----------------------------------------------------------------- events (delegated, attached once)
  var root = document.getElementById('app');
  var hotEl = null;
  function setHot(el) {
    if (hotEl === el) return;
    if (hotEl) hotEl.classList.remove('hot');
    hotEl = el;
    if (hotEl) hotEl.classList.add('hot');
  }
  function clearHot() { if (hotEl) hotEl.classList.remove('hot'); hotEl = null; }

  root.addEventListener('dragstart', function (e) {
    var el = e.target.closest('[data-id][draggable="true"]');
    if (!el) return;
    state.draggingId = el.getAttribute('data-id');
    try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', state.draggingId); } catch (x) {}
  });
  root.addEventListener('dragend', function () { state.draggingId = null; clearHot(); });
  root.addEventListener('dragover', function (e) {
    var el = e.target.closest('[data-drop]');
    if (!el) { setHot(null); return; }
    e.preventDefault();
    try { e.dataTransfer.dropEffect = 'move'; } catch (x) {}
    setHot(el);
  });
  root.addEventListener('drop', function (e) {
    var el = e.target.closest('[data-drop]');
    if (!el) return;
    e.preventDefault();
    clearHot();
    if (el.getAttribute('data-drop') === 'backlog') dropToBacklog();
    else dropToCell(parseInt(el.getAttribute('data-m'), 10), parseInt(el.getAttribute('data-d'), 10));
  });

  root.addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    if (action === 'overlay-close') {
      if (!e.target.closest('[data-modal-card]')) { state.editorId = null; render(); }
      return;
    }
    if (action === 'cat-overlay-close') {
      if (!e.target.closest('[data-modal-card]')) closeCat();
      return;
    }
    switch (action) {
      case 'add': addItem(); break;
      case 'reset': resetFilters(); break;
      case 'toggle-sidebar': toggleSidebar(); break;
      case 'scroll-today': {
        var tc = document.querySelector('[data-today]');
        if (tc && tc.scrollIntoView) tc.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
        break;
      }
      case 'toggle': toggleCategory(el.getAttribute('data-id')); break;
      case 'edit': state.editorId = el.getAttribute('data-id'); state.catEditor = null; render(); break;
      case 'delete': deleteItem(state.editorId); break;
      case 'unschedule': updateItem(state.editorId, { month: null, day: null, endMonth: null, endDay: null }); render(); break;
      case 'schedule-item': scheduleItem(state.editorId); break;
      case 'close': state.editorId = null; render(); break;
      case 'add-cat': openCatNew(); break;
      case 'edit-cat': openCatEdit(el.getAttribute('data-id')); break;
      case 'save-cat': saveCat(); break;
      case 'delete-cat': deleteCat(); break;
      case 'cat-close': closeCat(); break;
      case 'pick-swatch': if (state.catEditor) { state.catEditor.color = SWATCHES[parseInt(el.getAttribute('data-idx'), 10)]; render(); } break;
    }
  });

  // text inputs: update state silently to preserve focus/caret (no re-render per keystroke)
  root.addEventListener('input', function (e) {
    var f = e.target.getAttribute && e.target.getAttribute('data-field');
    if (!f) return;
    if (f === 'addTitle') { state.addTitle = e.target.value; }
    else if (f === 'editTitle') { if (state.editorId) updateItem(state.editorId, { title: e.target.value }); }
    else if (f === 'editNote') { if (state.editorId) updateItem(state.editorId, { note: e.target.value }); }
    else if (f === 'editStartDay') { if (state.editorId) updateItemDates(state.editorId, 'startDay', e.target.value, false); }
    else if (f === 'editEndDay') { if (state.editorId) updateItemDates(state.editorId, 'endDay', e.target.value, false); }
    else if (f === 'catName') { if (state.catEditor) state.catEditor.name = e.target.value; }
  });

  // selects / checkboxes: safe to re-render
  root.addEventListener('change', function (e) {
    var f = e.target.getAttribute && e.target.getAttribute('data-field');
    if (!f) return;
    if (f === 'addCategory') { state.addCategoryId = e.target.value; persist(); }
    else if (f === 'editCategory') { if (state.editorId) { updateItem(state.editorId, { categoryId: e.target.value }); render(); } }
    else if (f === 'editStartMonth') { if (state.editorId) updateItemDates(state.editorId, 'startMonth', e.target.value, true); }
    else if (f === 'editEndMonth') { if (state.editorId) updateItemDates(state.editorId, 'endMonth', e.target.value, true); }
    else if (f === 'editStartDay') { if (state.editorId) updateItemDates(state.editorId, 'startDay', e.target.value, true); }
    else if (f === 'editEndDay') { if (state.editorId) updateItemDates(state.editorId, 'endDay', e.target.value, true); }
    else if (f === 'catShade') { if (state.catEditor) { state.catEditor.shade = e.target.checked; render(); } }
    else if (f === 'catShadeAmt') { if (state.catEditor) { state.catEditor.partial = (e.target.value === 'quarter'); render(); } }
    else if (f === 'palette') { state.palette = e.target.value; persist(); render(); }
    else if (f === 'showBalance') { state.showBalance = e.target.checked; persist(); render(); }
    else if (f === 'compact') { state.compact = e.target.checked; persist(); render(); }
  });

  root.addEventListener('keydown', function (e) {
    var f = e.target.getAttribute && e.target.getAttribute('data-field');
    if (f === 'addTitle' && e.key === 'Enter') addItem();
    if (e.key === 'Escape' && state.catEditor) { closeCat(); return; }
    if (e.key === 'Escape' && state.editorId) { state.editorId = null; render(); }
  });

  render();
  cloudPull();
})();
</script>
</body>
</html>
